  <form action="/allocation_page" id="form" method="post">
  <div class="right">

       <div class="show_radio_button">
        <div class="show_radio_button1">Allocation</div>
        <div class="accept">
          <label for="allocation_accept">Accept</label>
          <input type="radio" name="status" id="allocation_accept" class="accept"  value="accept" >
        </div>
         <div class="reject">
          <label for="allocation_reject">Reject</label>
          <input type="radio" name="status" id="allocation_reject" class="reject"  value="reject"  >
        </div>
      </div>
      
      <div class="allocating_unit">
         <label for="firstname-input"> Admin Name</label>
       <input type="text" name="admin_name" id="firstname-input" placeholder="Enter Admin name" readonly> 
         <label for="firrequest-input"> Request id</label>
       <input type="text" name="request_id" id="firrequest-input" placeholder="Enter Request name" readonly> 
          <label for="firstunit-input">Requested unit</label>
       <input type="text" name="unit_id" id="firstunit-input" placeholder="Enter number of  unit need" readonly> 
    
        <div class="allocating_unit_type">
          <label for="bloodGroup">Blood Group:</label>
<select id="bloodGroup" name="bloodgroup" required>
  <option value="">-- Select Blood Group --</option>
  <option value="A+">A+</option>
  <option value="A-">A-</option>
  <option value="B+">B+</option>
  <option value="B-">B-</option>
  <option value="O+">O+</option>
  <option value="O-">O-</option>
  <option value="AB+">AB+</option>
  <option value="AB-">AB-</option>
</select>
        </div>
        <div class="allocating_unit_number">
          <div class="allocating_unit_number1">Allocate Unit</div>
          <input type="number" class="allocating_unit_number2" name="bloodunit" id="unitallocate-input" placeholder="unitallocate">
        </div>
         <div class="container3">   
         <div class="time">
 <label for="requiredDate">Allocation date:</label>
<input type="date" id="requiredDate" name="allocation_date">
</div>
      </div>
      </div>
      
      <div class="notes">
  <label for="notes">Notes:</label>
<textarea id="notes" name="notes" rows="3" placeholder="Enter reason (e.g., surgery, emergency)"></textarea>
</div>
      <div class="submit">
        <button class="submitallocate">submit</button>
      </div>
      </div>
