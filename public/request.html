<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/request.css">
 <script type="text/javascript" src="./js/request.js" defer></script>
</head>
<body>
  <div class="navbar">
  <div><b>Blood Bank System</b></div>
  <div>
    <span class="box-1"><a href="/history.html">History</a></span>
    <span class="box-1"><a href="/status_page.html">Status</a></span>
  </div>
</div>
  <div class="heading">
    <div class="request_page">request_dashboard</div>

  </div>
  <div class="welcome">
    <div class="welcome1_status">welcome</div>
    <div class="welcome_hospital_name">hospital_name</div>
  </div>
   <p id="error-message"></p>
  <div class="formdetail">
    <form  action="/request" id="form" method="post"  >
      <div >
        <input type="text" name="hospitalname" id="hospitalname-input" placeholder="Hospitalname" readonly class="box1"> 
      </div>
      <div > 
        <input type="text"  class="box2" name="hospitalid" id="hospitalid-input" placeholder="Hospitalid" readonly> 
      </div>
      <div class="select_blood_group">
        <label for="bloodGroup">Blood Group:</label>
<select id="bloodGroup" name="blood_group" required>
  <option value="">-- Select Blood Group --</option>
  <option value="A+">A+</option>
  <option value="A-">A-</option>
  <option value="B+">B+</option>
  <option value="B-">B-</option>
  <option value="O+">O+</option>
  <option value="O-">O-</option>
  <option value="AB+">AB+</option>
  <option value="AB-">AB-</option>
</select>
</div>
<div class="required_unit">
  <div class="required_unit1">unit required</div>
   <input type="text" name="unitrequired" id="unitrequired-input" placeholder="unitrequired"> 
</div>
      <div class="urgent_level">
        <label for="bloodGroup">Urgent level:</label>
<select id="urgency" name="urgency_level" required>
  <option value="">-- select urgency level --</option>
  <option value="Low">low</option>
  <option value="Medium">medium</option>
  <option value="High">high</option>
  <option value="Critical">critical</option>
 
</select>
</div>
<div class="time">
  <label for="requiredTime">Required By (Optional):</label>
<input type="date" id="requiredTime" name="required_by">
</div>
<div class="notes">
  <label for="notes">Notes (Optional):</label>
<textarea id="notes" name="notes" rows="3" placeholder="Enter reason (e.g., surgery, emergency)"></textarea>
</div>
        <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
