<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blood Request Allocation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Container */
    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    /* Card */
    .card {
      width: 260px;
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin: 0 0 10px;
      color: #333;
    }

    .card p {
      margin: 5px 0;
      font-size: 14px;
    }

    .urgent {
      color: red;
      font-weight: bold;
    }

    .status {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Blood Requests</h1>

  <div id="cardContainer" class="card-container"></div>

  <script>
    fetch("http://localhost:3000/index/allocation")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("cardContainer");
        container.innerHTML = "";

        console.log("Total Requests:", data.requestdetail.length); // debug

        data.requestdetail.forEach(req => {

          // find matching hospital
          const hospital = data.hospitalname.find(
            h => h.id === req.hospital_id
          );

          const card = document.createElement("div");
          card.classList.add("card");

          card.innerHTML = `
            <h3>R${req.request_id}</h3>

            <p><b>Hospital Name:</b> ${hospital ? hospital.name : "Unknown"}</p>
            <p><b>Hospital ID:</b> H${req.hospital_id}</p>
            <p><b>Blood Group:</b> ${req.blood_group}</p>
            <p><b>Unit Need:</b> ${req.unitrequired}</p>

            <p><b>Urgency:</b> 
              <span class="urgent">${req.urgency_level}</span>
            </p>

            <p><b>Status:</b> 
              <span class="status">${req.status || "pending"}</span>
            </p>

            <p><b>Required By:</b> ${req.required_by}</p>
            <p><b>Request Date:</b> ${req.request_date}</p>

            <p><b>Notes:</b> ${req.notes || "-"}</p>
          `;

          container.appendChild(card);
        });
      })
      .catch(err => console.error(err));
  </script>

</body>
</html>
